<script>
let isZoomed = false;
function scaleSheet() {
    const sheet = document.getElementById('ouenkaSheet');
    if (!sheet) return;
    if (window.matchMedia('print').matches) { sheet.style.transform = 'none'; return; }
    const baseWidthMm = 420; const baseHeightMm = 297;
    const padding = 20; const availableW = window.innerWidth - padding; const availableH = window.innerHeight - padding;
    const mmToPx = 3.78; const sheetW = baseWidthMm * mmToPx; const sheetH = baseHeightMm * mmToPx;
    let scale;
    if (isZoomed) { scale = Math.max(0.6, (window.innerWidth - 10) / sheetW); if (scale > 1.2) scale = 1.2;
    } else { const scaleW = availableW / sheetW; const scaleH = availableH / sheetH; scale = Math.min(scaleW, scaleH); if (scale > 1) scale = 1; }
    sheet.style.transform = `scale(${scale})`;
    document.body.style.justifyContent = (isZoomed && window.innerWidth < sheetW * scale) ? 'flex-start' : 'center';
}
function toggleZoom() { isZoomed = !isZoomed; const btn = document.querySelector('.zoom-btn'); btn.innerText = isZoomed ? "蜈ｨ" : "博"; scaleSheet(); if (isZoomed) window.scrollTo(0, 0); }
window.addEventListener('resize', scaleSheet);
window.addEventListener('load', scaleSheet);
</script>
