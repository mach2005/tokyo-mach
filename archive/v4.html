        @page {

        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto;
        }

        .container-wrapper {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sheet {
            width: 420mm;
            height: 297mm;
            background-color: var(--bg-white);
            box-sizing: border-box;
            padding: 8mm 12mm;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            transform-origin: top center;

        @media print {

            .container-wrapper { padding: 0 !important; margin: 0 !important; }
            .sheet { 
                box-shadow: none; 
                margin: 0; 
                width: 420mm; 
                height: 297mm; 
                transform: none !important;

            font-weight: 900;
            color: #000;

        .chance-theme-container {
            margin-top: 2.5mm;
            position: relative;

        .chance-grid-wrapper {
            background-color: var(--primary-color);
            padding: 2.5px;

            clip-path: polygon(0% 0%, 100% 0%, 100% 64.5%, 74.5% 64.5%, 74.5% 100%, 0% 100%);
        }

        .chance-grid {
            background-color: #fff;
            border-radius: 1.8mm;
            padding: 2.5mm;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: auto auto;
            gap: 2.5mm;
            grid-template-areas: 
                "col1 col2 col3 col4"
                "col1 col2 col3 recruit-spacer";
        }
        
        .chance-category:nth-child(1) { grid-area: col1; }
        .chance-category:nth-child(2) { grid-area: col2; }
        .chance-category:nth-child(3) { grid-area: col3; }
        .chance-category:nth-child(4) { grid-area: col4; }

        .chance-category {
            display: flex;
            flex-direction: column;
            gap: 2mm;

        .chance-item {
            font-size: 8pt;
            border: 1px solid #eee;
            padding: 1.2mm;
            border-radius: 1mm;
            line-height: 1.2;

        .chance-name {

            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 1mm;
            display: block;
            font-size: 8.5pt;

        .chance-lyrics-full {
            white-space: pre-wrap;

        .recruitment-box {
            position: absolute;
            bottom: 0;
            right: 0;
            width: calc(25% - 1.5mm);
            height: calc(35.5% - 1mm);
            border: 2.5px solid var(--primary-color);
            background-color: #fff;
            border-radius: 2mm;
            padding: 3mm;
            display: flex;
            align-items: center;
            gap: 4mm;
            box-sizing: border-box;
            z-index: 5;
        }

        .recruit-info { flex: 1; }
        .recruit-title { font-size: 11pt; font-weight: 900; color: #000; margin-bottom: 1.5mm; border-bottom: 2px solid var(--primary-color); display: inline-block; }
        .recruit-msg { font-size: 7.2pt; line-height: 1.3; color: #222; font-weight: 700; }
        .recruit-qr { width: 17mm; height: 17mm; border: 1px solid #ddd; padding: 1px; background: #fff; }
        .recruit-qr img { width: 100%; height: 100%; }

        .zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;

        .zoom-btn {

            color: var(--primary-color);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid var(--primary-color);
        }
    </style>
</head>

<script>
let isZoomed = false;

function scaleSheet() {
    const sheet = document.getElementById('ouenkaSheet');
    if (!sheet) return;
    
    // 蜊ｰ蛻ｷ譎ゅ・繧ｹ繧ｱ繝ｼ繝ｪ繝ｳ繧ｰ繧定ｧ｣髯､
    if (window.matchMedia('print').matches) {
        sheet.style.transform = 'none';
        return;
    }

    const baseWidthMm = 420;
    const baseHeightMm = 297;
    const padding = 20;
    const availableW = window.innerWidth - padding;
    const availableH = window.innerHeight - padding;
    
    const mmToPx = 3.78; 
    const sheetW = baseWidthMm * mmToPx;
    const sheetH = baseHeightMm * mmToPx;
    
    let scale;
    if (isZoomed) {
        scale = Math.max(0.6, (window.innerWidth - 10) / sheetW);
        if (scale > 1.2) scale = 1.2;
    } else {
        const scaleW = availableW / sheetW;
        const scaleH = availableH / sheetH;
        scale = Math.min(scaleW, scaleH);
        if (scale > 1) scale = 1;
    }

    sheet.style.transform = `scale(${scale})`;
    document.body.style.justifyContent = (isZoomed && window.innerWidth < sheetW * scale) ? 'flex-start' : 'center';
}

function toggleZoom() {
    isZoomed = !isZoomed;
    const btn = document.querySelector('.zoom-btn');
    btn.innerText = isZoomed ? "蜈ｨ" : "博";
    scaleSheet();
    if (isZoomed) window.scrollTo(0, 0);
}

window.addEventListener('resize', scaleSheet);
window.addEventListener('load', scaleSheet);
</script>
