name: Daily SNS Update

on:
  schedule:
    # 毎日00:05 JST (15:05 UTC) に実行
    - cron: '5 15 * * *'
  workflow_dispatch: # 手動実行用

jobs:
  update-sns:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/set-up-python@v5
        with:
          python-version: '3.x'

      - name: Run SNS update scripts
        run: |
          python develop/update_x_feed.py
          python develop/update_ig_feed.py
          
      - name: Check for changes
        id: git-check
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add HP/index.html public/images/latest_ig.jpg
          git status
          git diff --staged --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git commit -m "chore: auto-update X feed [skip ci]"
          git push
