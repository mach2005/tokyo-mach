name: Daily SNS Update

on:
  schedule:
    # 毎日00:00 JST (15:00 UTC) に実行
    - cron: '0 15 * * *'
  workflow_dispatch: # 手動実行用

jobs:
  update-sns:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run update scripts
        run: |
          python develop/update_x_feed.py
          python develop/update_game_result.py
          # python develop/update_ig_feed.py # 複数画像・日付未対応のため一旦停止
          
      - name: Check for changes
        id: git-check
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add HP/index.html portal/index.html HP/schedule.html develop/build_pages.py public/images/latest_ig.jpg
          git status
          git diff --staged --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git commit -m "chore: auto-update SNS and game results [skip ci]"
          git push
